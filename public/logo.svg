<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <!-- Three interlocking rings: top-center, bottom-left, bottom-right -->
  <!-- Top circle -->
  <circle cx="20" cy="16" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <!-- Bottom-left circle -->
  <circle cx="13" cy="29" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <!-- Bottom-right circle -->
  <circle cx="27" cy="29" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <!-- Gold center overlap highlight dot -->
  <circle cx="20" cy="24" r="3.5" fill="#C9A84C" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="46" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E" letter-spacing="-0.5">polygamy</text>
  <text x="161" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#C9A84C" letter-spacing="-0.5">.ai</text>
</svg>
