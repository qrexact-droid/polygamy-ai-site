<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <!-- Three interlocking rings -->
  <circle cx="20" cy="16" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <circle cx="13" cy="29" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <circle cx="27" cy="29" r="9" fill="none" stroke="#6B3FA0" stroke-width="2.5"/>
  <!-- Gold center dot -->
  <circle cx="20" cy="24" r="3.5" fill="#C9A84C" opacity="0.85"/>
  <!-- Wordmark — single text element, tspan for .ai color -->
  <text x="46" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#FFFFFF">polygamy</tspan><tspan fill="#C9A84C">.ai</tspan>
  </text>
</svg>
